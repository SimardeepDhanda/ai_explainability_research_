<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Understanding Study</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="progress-header" id="progressHeader">
        <div class="progress-info">
            <span class="progress-label" id="progressLabel">Introduction</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <!-- Dynamically rendered by script.js -->
    </div>

    <!-- Ground truth popout — slides in above bottom bar after submit -->
    <div class="gt-popout" id="gtPopout">
        <span class="gt-dataset" id="gtDataset"></span>
        <span class="gt-label">Actual Sale Price:</span>
        <span class="gt-value" id="gtValue">____</span>
    </div>

    <div class="bottom-bar">
        <div id="errorMessage" class="error-message"></div>
        <button class="btn-next" id="nextBtn">Begin Study ›</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
